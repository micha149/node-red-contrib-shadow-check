<div class="form-row">
  <label for="node-input-azimuth"><i class="fa fa-compass"></i> Azimuth</label>
  <input type="number" min="0" max="360" id="node-input-azimuth" />
</div>

<div class="form-row">
  <label for="node-input-width"><i class="fa fa-arrows-h"></i> Width</label>
  <input type="number" id="node-input-width" />
</div>

<div class="form-row">
  <label for="node-input-height"><i class="fa fa-arrows-v"></i> Height</label>
  <input type="number" id="node-input-height" />
</div>

<div class="form-row">
  <label for="node-input-inset"><i class="fa fa-arrows-h"></i> Inset</label>
  <input type="number" id="node-input-inset" />
</div>

<div class="form-row">
  <label for="node-input-overhangOffsetLeft"
    ><i class="fa fa-arrows-h"></i> Overhang Offset Left</label
  >
  <input type="number" id="node-input-overhangOffsetLeft" />
</div>

<div class="form-row">
  <label for="node-input-overhangOffsetRight"
    ><i class="fa fa-arrows-h"></i> Overhang Offset Right</label
  >
  <input type="number" id="node-input-overhangOffsetRight" />
</div>

<div class="form-row">
  <label for="node-input-overhangOffsetTop"
    ><i class="fa fa-arrows-v"></i> Overhang Offset Top</label
  >
  <input type="number" id="node-input-overhangOffsetTop" />
</div>

<div class="form-row">
  <label for="node-input-overhang"
    ><i class="fa fa-arrows-h"></i> Overhang</label
  >
  <input type="number" id="node-input-overhang" />
</div>

<div class="form-row">
  <label for="node-input-topic"><i class="fa fa-tasks"></i> Topic</label>
  <input type="text" id="node-input-topic" />
</div>

<div class="form-row">
  <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
  <input type="text" id="node-input-name" placeholder="Name" />
</div>
